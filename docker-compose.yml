services:

  db:
    image: postgres:16-alpine
    container_name: worship-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: worship
      POSTGRES_PASSWORD: worship
      POSTGRES_DB: worship
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worship"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: